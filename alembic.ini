# Alembic configuration for aileadz (Futurematch).
#
# NOTE: Alembic is OPTIONAL at runtime. The Flask app (create_app() in run.py)
# does NOT import Alembic and never reads this file. It exists purely so that
# operators / CI can run forward schema migrations from the command line, e.g.:
#
#     alembic upgrade head
#
# The live schema today is still bootstrapped by the homegrown
# "reflect-and-ALTER" logic in run.py's before_request hooks
# (CREATE TABLE IF NOT EXISTS + _auto_sync_columns). That stays in place.
# Alembic is added ALONGSIDE it as the forward-migration runner — see
# migrations/README.md for the careful one-time baseline/stamp procedure.

[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Template used to generate migration file names; %%(rev)s and friends are
# Alembic-escaped (double %% so ConfigParser leaves them for Alembic).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use os.pathsep (e.g. ':') to provide multiple paths for prepending to
# sys.path if needed. Defaults to the directory containing alembic.ini.
prepend_sys_path = .

# Timezone for timestamps inside migration files. Empty -> naive/local.
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# IMPORTANT: the real database URL is built from the MYSQL_* environment
# variables inside migrations/env.py (matching run.py's config). The value
# here is only a placeholder/fallback so Alembic's config parser is happy and
# so `alembic` can run even when env.py's override path is bypassed. Do NOT
# rely on it pointing at a real database — env.py overrides it from env vars.
#
# % characters must be escaped as %% for ConfigParser.
sqlalchemy.url = mysql+pymysql://user:password@localhost:3306/dbname?charset=utf8mb4


# Logging configuration. Standard Alembic stanza; tweak levels as desired.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
