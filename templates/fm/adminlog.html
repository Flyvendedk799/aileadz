<style>body{background:#0a0d0c;color:#eef0ec;font-family:var(--ff)}.wrap{max-width:1100px;margin:0 auto;padding:28px 24px}
.top{display:flex;align-items:center;gap:12px;margin-bottom:20px}.mark{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#052420;font-family:var(--ff-display);font-weight:800;background:linear-gradient(140deg,#2bb6a6,#239789 70%,#e0824f)}
