{% extends "base.html" %}
{% block title %}SSO — {{ company.company_name }}{% endblock %}
{% block content %}
<div class="container mt-5" style="max-width:480px;">
  <div class="card shadow-sm">
    <div class="card-body p-4 text-center">
      {% if white_label_active and company_branding.company_logo %}
      <img src="{{ company_branding.company_logo }}" alt="{{ company.company_name }}" style="height:48px;margin-bottom:16px;">
      {% endif %}
      <h2>{{ company.company_name }}</h2>
      <p class="text-muted">Log ind med {{ provider|upper }}</p>
      <form method="post" action="{{ url_for('sso.sso_callback', company_slug=company.company_slug, provider=provider) }}">
        <div class="mb-3 text-start">
          <label class="form-label">E-mail</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3 text-start">
          <label class="form-label">Adgangskode</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Fortsæt</button>
      </form>
      <p class="mt-3 mb-0"><a href="{{ url_for('auth.login', slug=company.company_slug) }}">Tilbage til login</a></p>
    </div>
  </div>
</div>
{% endblock %}
