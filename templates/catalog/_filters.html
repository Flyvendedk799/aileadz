<form class="catalog-filter" method="GET" action="{{ url_for('catalog.catalog_index') }}">
  <div class="row g-3 align-items-end">
    <div class="col-lg-3 col-md-6">
      <label class="form-label" for="catalog-q">Sog</label>
      <input id="catalog-q" class="form-control" type="search" name="q" value="{{ filters.q }}" placeholder="Kursus, emne eller leverandor">
    </div>
    <div class="col-lg-2 col-md-6">
      <label class="form-label" for="catalog-category">Kategori</label>
      <select id="catalog-category" class="form-select" name="category">
        <option value="">Alle kategorier</option>
        {% for category in filter_options.categories %}
        <option value="{{ category.slug }}" {% if filters.category == category.slug %}selected{% endif %}>{{ category.name }} ({{ category.count }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-lg-2 col-md-6">
      <label class="form-label" for="catalog-vendor">Leverandor</label>
      <select id="catalog-vendor" class="form-select" name="vendor">
        <option value="">Alle leverandorer</option>
        {% for vendor in filter_options.vendors %}
        <option value="{{ vendor.slug }}" {% if filters.vendor == vendor.slug %}selected{% endif %}>{{ vendor.name }} ({{ vendor.course_count }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-lg-2 col-md-6">
      <label class="form-label" for="catalog-format">Format</label>
      <select id="catalog-format" class="form-select" name="format">
        <option value="">Alle formater</option>
        {% for format in filter_options.formats %}
        <option value="{{ format }}" {% if filters.format == format %}selected{% endif %}>{{ format }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-lg-1 col-md-6">
      <label class="form-label" for="catalog-max">Max pris</label>
      <input id="catalog-max" class="form-control" type="number" min="0" step="500" name="price_max" value="{{ filters.price_max }}">
    </div>
    <div class="col-lg-1 col-md-6">
      <label class="form-label" for="catalog-sort">Sortering</label>
      <select id="catalog-sort" class="form-select" name="sort">
        <option value="relevance" {% if filters.sort == 'relevance' %}selected{% endif %}>Match</option>
        <option value="price_asc" {% if filters.sort == 'price_asc' %}selected{% endif %}>Pris op</option>
        <option value="price_desc" {% if filters.sort == 'price_desc' %}selected{% endif %}>Pris ned</option>
        <option value="vendor" {% if filters.sort == 'vendor' %}selected{% endif %}>Leverandor</option>
      </select>
    </div>
    <div class="col-lg-1 col-md-6 d-grid">
      <button class="btn btn-primary" type="submit"><i class="fa-solid fa-search"></i></button>
    </div>
  </div>
</form>
