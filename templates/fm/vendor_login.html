<!DOCTYPE html>
<html lang="da" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leverandorlogin · Futurematch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='futurematch/assets/fm.css') }}?v=14" />
  <style>
    body { min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
           background: var(--fm-bg); color: var(--fm-ink); font-family: 'Hanken Grotesk', system-ui, sans-serif; padding: 24px; }
    .vp-card { width: 100%; max-width: 420px; background: var(--fm-surface, #fff); border: 1px solid var(--fm-line);
               border-radius: 16px; padding: 32px 28px; box-shadow: 0 18px 50px rgba(0,0,0,.08); }
    .vp-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .vp-mark { width: 38px; height: 38px; border-radius: 10px; background: var(--fm-primary); color: #fff;
               display: grid; place-items: center; font-weight: 800; font-size: 18px; }
    .vp-brand .name { font-weight: 800; font-size: 18px; }
    .vp-title { font-family: 'Bricolage Grotesque', serif; font-size: 22px; font-weight: 700; margin: 18px 0 4px; }
    .vp-sub { color: var(--fm-ink-2); font-size: 13.5px; margin-bottom: 22px; }
    .vp-field { margin-bottom: 16px; }
    .vp-field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: var(--fm-ink); }
    .vp-input { width: 100%; box-sizing: border-box; padding: 11px 13px; border: 1px solid var(--fm-line-2);
                border-radius: 10px; font-size: 14px; background: var(--fm-bg); color: var(--fm-ink); }
    .vp-input:focus { outline: none; border-color: var(--fm-primary); box-shadow: 0 0 0 3px var(--fm-primary-tint); }
    .vp-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--fm-primary); color: #fff;
              font-weight: 700; font-size: 14.5px; cursor: pointer; transition: filter .15s; }
    .vp-btn:hover { filter: brightness(1.05); }
    .vp-flash { padding: 10px 13px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
    .vp-flash.danger { background: var(--fm-clay-tint); color: var(--fm-clay); }
    .vp-flash.success { background: var(--fm-primary-tint); color: var(--fm-primary-700); }
    .vp-foot { margin-top: 18px; font-size: 12px; color: var(--fm-ink-3); text-align: center; }
  </style>
</head>
<body data-page="vendor-login">
  <div class="vp-card">
    <div class="vp-brand">
      <span class="vp-mark">F</span>
      <span class="name">Futurematch</span>
    </div>
    <div class="vp-title">Leverandorportal</div>
    <div class="vp-sub">Log ind for at administrere dit katalog og dine indsendelser.</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="vp-flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('vendor.vendor_login') }}" autocomplete="on">
      <div class="vp-field">
        <label for="email">E-mail</label>
        <input class="vp-input" type="email" id="email" name="email" value="{{ email or '' }}"
               placeholder="navn@firma.dk" required autofocus />
      </div>
      <div class="vp-field">
        <label for="password">Adgangskode</label>
        <input class="vp-input" type="password" id="password" name="password"
               placeholder="••••••••" required />
      </div>
      <button class="vp-btn" type="submit">Log ind</button>
    </form>

    <div class="vp-foot">Kun for godkendte leverandorer.</div>
  </div>
</body>
</html>
